  outdoor-light-on-door-macro:
    zoneId: outdoor
    name: Dwór on animacja od drzwi
    blocks:
      - blockType: CONDITION
        condition:
          type: LOGIC
          logicalType: AND
          conditions:
            - type: COMPARE
              compareType: EQUAL
              fetcher:
                fetcherType: CURRENT_STATE_VARIABLE
              testValue:
                type: STRING
                value: auto
            - type: TIME_BETWEEN
              fetcher:
                fetcherType: CURRENT_TIME
              fromTime:
                type: TIME
                value: '${outdoor-time.start}'
              toTime:
                type: TIME
                value: '${outdoor-time.end}'
        trueBlock:
          blockType: BLOCK
          blocs:
            - blockType: CONDITION
              condition:
                type: COMPARE
                compareType: EQUAL
                fetcher:
                  fetcherType: MACRO_VARIABLE
                  key: pir-value
                testValue:
                  type: BOOLEAN
                  value: true
              trueBlock:
                blockType: BLOCK
                blocs:
                  - blockType: RUNNER
                    runnerType: TIMER
                    timerId: outdoor-entry-light-off-timer
                    action: CLEAR
                  - blockType: RUNNER
                    runnerType: STATE_ACTION
                    sceneIds:
                      - auto
                    ledChangeData:
                      time: ${cv-home-out.default-led-change-on-time}
                      stepTime: 30
                    actions:
                      - ioId: outdoor-door
                        brightness: ${cv-home-out.brightness-entry}
                        color:
                          w: ${cv-home-out.default-cold-white}
                          ww: ${cv-home-out.default-warm-white}
                      - ioId: cct-a-roof-1
                        brightness: ${cv-home-out.brightness-a}
                        delay: 0
                        color:
                          w: ${cv-home-out.default-cold-white}
                          ww: ${cv-home-out.default-warm-white}
                      - ioId: cct-a-roof-2
                        brightness: ${cv-home-out.brightness-a}
                        delay: 0
                        color:
                          w: ${cv-home-out.default-cold-white}
                          ww: ${cv-home-out.default-warm-white}
                      - ioId: ctt-out-roof-1
                        brightness: ${cv-home-out.brightness-roof}
                        delay: 0
                        color:
                          w: ${cv-home-out.default-cold-white}
                          ww: ${cv-home-out.default-warm-white}
