macros:
  lobby-pir-macro:
    zoneId: office
    name: Korytarz dół makro
    blocks:
      - blockType: CONDITION
        condition:
          type: COMPARE
          compareType: EQUAL
          fetcher:
            fetcherType: MACRO_VARIABLE
            key: pir-value
          testValue:
            type: BOOLEAN
            value: true
        trueBlock:
          blockType: BLOCK
          blocs:
            - blockType: RUNNER
              runnerType: TIMER
              timerId: lobby-down-light-off-timer
              action: CLEAR
            - blockType: RUNNER
              runnerType: STATE_ACTION
              sceneIds:
                - auto
                - manual
                - night
              ledChangeData:
                time: ${cv-home-down.default-led-change-on-time}
                stepTime: 30
              actions:
                - ioId: rgbw-lobby
                  brightness: ${cv-home-down.brightness-lobby}
                  color:
                    r: 0
                    g: 0
                    b: 0
                    w: 255
        falseBlock:
          blockType: BLOCK
          blocs:
            - blockType: RUNNER
              runnerType: TIMER
              timerId: lobby-down-light-off-timer
              action: UPDATE_TIME
              time: 25000
